[ppo]
# Rollout
max_new_tokens = 64
temperature = 1.0
top_p = 1.0

# Reward shaping (KL penalty against the SFT reference)
kl_coef = 0.1
kl_method = "k_3"               # see llm_rlhf.ppo.losses.kl_estimate
reward_clip = 5.0

# GAE
gamma = 1.0
lam = 0.95

# Optimisation
learning_rate = 1e-6
ppo_epochs = 4                  # mini-epochs per rollout
mini_batch_size = 2
clip_epsilon = 0.2
value_coef = 0.5
entropy_coef = 0.01
max_grad_norm = 1.0
output_dir = "checkpoints/ppo"
